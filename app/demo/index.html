<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Verdant — a real-time crypto portfolio dashboard built with @borderline/ui and the Kraken API."
    />
    <title>Verdant · Crypto Portfolio</title>
    <script>
      // Apply the persisted (or system) theme before first paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem("borderline-theme");
          var theme =
            stored === "light" || stored === "dark" || stored === "system"
              ? stored
              : "system";
          var isDark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          root.classList.toggle("dark", isDark);
          root.style.colorScheme = isDark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
